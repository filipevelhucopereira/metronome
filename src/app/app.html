<div class="app-shell">
  <header class="top-bar">
    <div>
      <p class="top-bar__eyebrow">Offline Ready</p>
      <a routerLink="/" class="top-bar__brand">Metronome PWA</a>
    </div>

    <nav class="top-bar__nav" aria-label="Primary navigation">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Player</a>
      <a routerLink="/songs" routerLinkActive="is-active">Songs</a>
      <a routerLink="/setlists" routerLinkActive="is-active">Setlists</a>
    </nav>
  </header>

  <main class="app-shell__content">
    <router-outlet></router-outlet>
  </main>

  <nav class="bottom-nav" aria-label="Mobile navigation">
    <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Player</a>
    <a routerLink="/songs" routerLinkActive="is-active">Songs</a>
    <a routerLink="/setlists" routerLinkActive="is-active">Setlists</a>
  </nav>
