<div class="app-shell">
  <header class="top-bar">
    <a routerLink="/" class="top-bar__brand" aria-label="Metronome PWA home">
      <span class="top-bar__eyebrow">Offline Ready</span>
      <strong>Metronome PWA</strong>
      <small>Offline tempo practice for player, songs, and setlists.</small>
    </a>

    <nav class="top-bar__nav" aria-label="Primary navigation">
      <a routerLink="/" routerLinkActive="is-active" ariaCurrentWhenActive="page" [routerLinkActiveOptions]="{ exact: true }">Player</a>
      <a routerLink="/songs" routerLinkActive="is-active" ariaCurrentWhenActive="page">Songs</a>
      <a routerLink="/setlists" routerLinkActive="is-active" ariaCurrentWhenActive="page">Setlists</a>
    </nav>
  </header>

  <main class="app-shell__content">
    <router-outlet></router-outlet>
  </main>

  <nav class="bottom-nav" aria-label="Mobile navigation">
    <a routerLink="/" routerLinkActive="is-active" ariaCurrentWhenActive="page" [routerLinkActiveOptions]="{ exact: true }">Player</a>
    <a routerLink="/songs" routerLinkActive="is-active" ariaCurrentWhenActive="page">Songs</a>
    <a routerLink="/setlists" routerLinkActive="is-active" ariaCurrentWhenActive="page">Setlists</a>
  </nav>
</div>
