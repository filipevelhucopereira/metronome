<div class="visualizer-frame">
  <p class="sr-only">{{ liveLabel() }}</p>
  <div class="visualizer-chip">{{ stateLabel() }}</div>

  <svg viewBox="0 0 120 120" aria-hidden="true" class="visualizer-canvas">
    <circle cx="60" cy="60" r="44" class="orbit"></circle>
    <circle
      cx="60"
      cy="60"
      r="44"
      class="orbit-progress"
      transform="rotate(-90 60 60)"
      stroke-dasharray="276.46"
      [attr.stroke-dashoffset]="progressDashOffset()"
    ></circle>

    @for (marker of laneMarkers(); track marker.index) {
      <circle
        [attr.cx]="marker.x"
        [attr.cy]="marker.y"
        r="4.5"
        class="lane-marker"
        [class.is-passed]="marker.isPassed"
        [class.is-current]="marker.isCurrent"
      ></circle>
    }

    <g [attr.transform]="pulseTransform()">
      <circle cx="60" cy="60" r="27" class="pulse-halo" [attr.opacity]="haloOpacity()"></circle>
      <circle
        cx="60"
        cy="60"
        r="22"
        class="pulse-core"
        [class.is-bar]="structure().emphasis === 'bar'"
        [class.is-beat]="structure().emphasis === 'beat'"
      ></circle>
    </g>

    <circle cx="60" cy="60" r="6" class="pivot"></circle>

    <text x="60" y="65" class="beat-text">{{ structure().currentBeatInBar }}</text>
    <text x="60" y="81" class="beat-caption">/{{ structure().beatsPerBar }}</text>
  </svg>
</div>
