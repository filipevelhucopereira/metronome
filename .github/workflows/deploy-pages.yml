name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --watch=false

      - name: Resolve Angular base href
        id: basehref
        shell: bash
        run: |
          base_path="${{ steps.pages.outputs.base_path }}"
          if [[ -z "$base_path" ]]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          else
            echo "value=${base_path}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build production site
        run: npm run build -- --configuration production --base-href "${{ steps.basehref.outputs.value }}"

      - name: Prepare Pages artifact
        run: npm run pages:prepare -- dist/metronome-pwa/browser

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/metronome-pwa/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
